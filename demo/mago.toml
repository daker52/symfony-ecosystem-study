# Mago — den 16
# Lokálně (Windows): tools/mago/mago.exe analyze
# Composer wrapper: vendor/bin/mago (stáhne binary)
# CI: curl installer + mago analyze
#
# https://mago.carthage.software/

php-version = "8.3.0"

[source]
paths = ["src"]
includes = ["vendor"]
excludes = [
    "var",
    "public/build",
    "tools",
    "node_modules",
]

[linter]
integrations = ["symfony", "phpunit"]

[analyzer]
find-unused-definitions = false
find-unused-expressions = false
