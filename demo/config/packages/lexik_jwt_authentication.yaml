lexik_jwt_authentication:
    # HS256 — secret string (studijní setup bez openssl CLI na Windows)
    # V produkci typicky RS256 + private.pem / public.pem
    secret_key: '%env(JWT_SECRET_KEY)%'
    pass_phrase: '%env(JWT_PASSPHRASE)%'
    token_ttl: 3600
    encoder:
        signature_algorithm: HS256
