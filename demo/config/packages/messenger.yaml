framework:
    messenger:
        failure_transport: failed

        transports:
            # Den 15 default: amqpsim = Rabbit topologie bez Dockeru
            # Živý Rabbit: amqplib://guest:guest@127.0.0.1:5672/%2f?exchange=pulse.work&queue=pulse.async&routing_key=work.advance
            # Legacy: doctrine://default?auto_setup=0
            async:
                dsn: '%env(MESSENGER_TRANSPORT_DSN)%'
                retry_strategy:
                    max_retries: 3
                    multiplier: 2
            failed: 'doctrine://default?queue_name=failed'

        default_bus: command.bus

        buses:
            command.bus:
                middleware:
                    - App\Messenger\Middleware\BrokerPassportMiddleware
            query.bus: []

        routing:
            Symfony\Component\Mailer\Messenger\SendEmailMessage: async
            Symfony\Component\Notifier\Message\ChatMessage: async
            Symfony\Component\Notifier\Message\SmsMessage: async

            App\Message\Command\CreateStudyTopicCommand: async
            App\Message\Event\StudyTopicCreatedMessage: async
            App\Message\Event\AdvanceWorkOrderMessage: async
