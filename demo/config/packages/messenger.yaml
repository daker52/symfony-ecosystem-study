framework:
    messenger:
        failure_transport: failed

        transports:
            # Den 10: DSN z .env — doctrine://… (default) NEBO amqp://… (RabbitMQ)
            # docker compose -f docker-compose.rabbitmq.yml up -d
            # MESSENGER_TRANSPORT_DSN=amqp://guest:guest@127.0.0.1:5672/%2f/messages
            # vyžaduje: composer require symfony/amqp-messenger + ext-amqp
            async:
                dsn: '%env(MESSENGER_TRANSPORT_DSN)%'
                retry_strategy:
                    max_retries: 3
                    multiplier: 2
            failed: 'doctrine://default?queue_name=failed'

        default_bus: command.bus

        buses:
            command.bus: []
            query.bus: []

        routing:
            Symfony\Component\Mailer\Messenger\SendEmailMessage: async
            Symfony\Component\Notifier\Message\ChatMessage: async
            Symfony\Component\Notifier\Message\SmsMessage: async

            App\Message\Command\CreateStudyTopicCommand: async
            App\Message\Event\StudyTopicCreatedMessage: async
