services:
  version: '3.9'

  # Den 10 — lokální RabbitMQ pro Messenger AMQP transport
  # Spuštění: docker compose -f docker-compose.rabbitmq.yml up -d
  # UI: http://localhost:15672 (guest / guest)
  rabbitmq:
    image: rabbitmq:3.13-management
    ports:
      - '5672:5672'
      - '15672:15672'
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ['CMD', 'rabbitmq-diagnostics', '-q', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
